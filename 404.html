<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <div class="logo-pixel" aria-hidden="true"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>

  <main>
    <div class="page-404">
      <div class="char-404" aria-hidden="true">🧱</div>
      <div class="num-404" aria-label="Error 404">404</div>

      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">

    <div class="container"><p>© PixelDrop</p></div>
  </footer>
  <script>
    (function(){function lsGet(k,f){try{return JSON.parse(localStorage.getItem(k))??f;}catch{return f;}}function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}function setTheme(t){document.documentElement.setAttribute('data-theme',t);lsSet('pd_theme',t);const i=document.getElementById('theme-icon');const l=document.getElementById('theme-label');if(i)i.textContent=t==='dark'?'🌙':'☀️';if(l)l.textContent=t==='dark'?'Dark':'Light';}setTheme(lsGet('pd_theme','dark'));document.getElementById('theme-toggle').addEventListener('click',()=>{setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');});})();
  </script>
